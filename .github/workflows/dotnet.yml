name: .NET CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  build-test-demo:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore SE2RobotFramework.slnx

      - name: Build
        run: dotnet build SE2RobotFramework.slnx --configuration Release --no-restore --warnaserror

      - name: Test
        run: dotnet test SE2RobotFramework.Tests/SE2RobotFramework.Tests.csproj --configuration Release --no-build --no-restore --logger "console;verbosity=normal"

      - name: Run demo smoke test
        run: dotnet run --project SE2RobotFramework.Demo/SE2RobotFramework.Demo.csproj --configuration Release --no-build --no-restore
